<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>PvZ 格斗对战</title>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0d1a;color:#eee;font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
.screen{display:none;width:100%;max-width:1100px;padding:16px;}
.screen.active{display:flex;flex-direction:column;align-items:center;}
#screen-login{gap:20px;}
.logo{font-size:36px;font-weight:bold;color:#8bc34a;letter-spacing:3px;text-shadow:0 0 20px #4a7c1e;}
.logo span{color:#ff7043;}
.subtitle{font-size:14px;color:#888;}
.input-wrap{display:flex;flex-direction:column;gap:10px;width:320px;}
.input-wrap input{background:#1a1a2e;border:1.5px solid #444;border-radius:6px;padding:12px 16px;color:#eee;font-family:inherit;font-size:15px;text-transform:uppercase;letter-spacing:2px;text-align:center;outline:none;transition:border-color .2s;}
.input-wrap input:focus{border-color:#8bc34a;}
.btn{padding:12px 32px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:bold;letter-spacing:1px;transition:all .15s;}
.btn-green{background:#5cb85c;color:#fff;}
.btn-green:hover{background:#4cae4c;transform:translateY(-1px);}
.btn-orange{background:#ff7043;color:#fff;}
.btn-gray{background:#333;color:#aaa;border:1px solid #555;}
.btn-gray:hover{background:#444;}
.err{color:#ff5252;font-size:13px;min-height:18px;text-align:center;}
#screen-match{gap:24px;text-align:center;}
.match-status{font-size:18px;color:#8bc34a;}
.dots::after{content:'';animation:dots 1.5s infinite;}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
.player-card{background:#1a1a2e;border:1px solid #333;border-radius:10px;padding:16px 32px;font-size:14px;color:#aaa;}
.player-card .pname{font-size:18px;color:#eee;font-weight:bold;margin-bottom:4px;}
.player-card .pscore{color:#8bc34a;}
#screen-select{gap:20px;}
.vs-banner{font-size:22px;font-weight:bold;color:#fff;letter-spacing:4px;}
.heroes-grid{display:flex;gap:24px;justify-content:center;}
.hero-card{background:#1a1a2e;border:2px solid #333;border-radius:12px;padding:20px;cursor:pointer;text-align:center;transition:all .2s;width:160px;}
.hero-card:hover{border-color:#8bc34a;transform:translateY(-4px);}
.hero-card.selected{border-color:#8bc34a;background:#1e2d10;}
.hero-card canvas{display:block;margin:0 auto 8px;}
.hero-card .hname{font-size:14px;font-weight:bold;}
.hero-card .hdesc{font-size:11px;color:#888;margin-top:4px;}
.select-status{font-size:13px;color:#888;text-align:center;}
.select-status span{color:#8bc34a;}
.opponents-row{display:flex;gap:40px;justify-content:center;align-items:center;}
.opp-info{text-align:center;font-size:13px;color:#aaa;}
.opp-info .oname{font-size:16px;color:#eee;font-weight:bold;}
.opp-info .ohero{color:#8bc34a;margin-top:4px;}
#screen-game{padding:0;max-width:none;}
#game-wrap{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d0d1a;}
#hud{width:1100px;display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;gap:12px;}
.phud{flex:1;display:flex;flex-direction:column;gap:4px;}
.phud.right{align-items:flex-end;}
.pname-hud{font-size:13px;font-weight:bold;color:#eee;}
.hp-wrap{width:100%;height:13px;background:#333;border-radius:2px;border:1px solid #555;overflow:hidden;}
.hp-fill{height:100%;border-radius:2px;transition:width .1s;}
#hp1-fill{background:linear-gradient(90deg,#5cb85c,#8bc34a);}
#hp2-fill{background:linear-gradient(90deg,#f44,#ff7043);float:right;}
.skill-row{display:flex;gap:4px;}
.phud.right .skill-row{flex-direction:row-reverse;}
.sk{width:32px;height:32px;border:1.5px solid #555;border-radius:4px;background:#222;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa;position:relative;overflow:hidden;}
.sk .cd{position:absolute;inset:0;background:rgba(0,0,0,.75);font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;}
.sk-label{font-size:9px;color:#666;text-align:center;margin-top:1px;}
#center-hud{text-align:center;min-width:90px;}
#timer{font-size:24px;font-weight:bold;color:#fff;}
#round-txt{font-size:11px;color:#888;margin-top:2px;}
canvas#gc{display:block;border:2px solid #222;image-rendering:pixelated;}
#hint{font-size:10px;color:#444;text-align:center;margin-top:4px;}
#screen-result{gap:20px;text-align:center;}
.result-title{font-size:32px;font-weight:bold;}
.result-title.win{color:#8bc34a;}
.result-title.lose{color:#ff5252;}
.result-cards{display:flex;gap:24px;justify-content:center;}
.result-card{background:#1a1a2e;border:1px solid #333;border-radius:10px;padding:20px 32px;min-width:180px;}
.result-card .rname{font-size:16px;font-weight:bold;margin-bottom:8px;}
.result-card .rscore{font-size:24px;font-weight:bold;color:#8bc34a;}
.result-card .rchange{font-size:13px;color:#888;margin-top:4px;}
.result-card.winner{border-color:#8bc34a;}
.result-card.loser{border-color:#ff5252;}
#screen-menu{gap:16px;}
.tabs{display:flex;gap:8px;}
.tab{padding:8px 20px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;background:#222;border:1px solid #444;color:#aaa;}
.tab.active{background:#8bc34a;color:#fff;border-color:#8bc34a;}
.table-wrap{width:100%;max-width:700px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:8px 12px;text-align:left;color:#888;border-bottom:1px solid #333;font-weight:normal;}
td{padding:8px 12px;border-bottom:1px solid #222;}
tr:hover td{background:#1a1a2e;}
.rank-1 td:first-child{color:#ffd700;font-weight:bold;}
.rank-2 td:first-child{color:#c0c0c0;font-weight:bold;}
.rank-3 td:first-child{color:#cd7f32;font-weight:bold;}
.win-tag{color:#8bc34a;font-weight:bold;}
.lose-tag{color:#ff5252;font-weight:bold;}
.menu-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
#overlay-msg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#fff;flex-direction:column;gap:16px;}
#overlay-msg.show{display:flex;}
</style>
</head>
<body>
<div id="screen-login" class="screen active">
  <div class="logo">PvZ <span>FIGHT</span></div>
  <div class="subtitle">植物大战僵尸 — 双人联网格斗</div>
  <div class="input-wrap">
    <input id="key-input" maxlength="8" placeholder="输入学生密钥" oninput="this.value=this.value.toUpperCase()">
    <button class="btn btn-green" onclick="doLogin()">登 录</button>
    <div id="login-err" class="err"></div>
  </div>
</div>
<div id="screen-menu" class="screen">
  <div class="logo" style="font-size:24px">PvZ <span>FIGHT</span></div>
  <div id="menu-player" style="color:#8bc34a;font-size:14px"></div>
  <div class="menu-btns">
    <button class="btn btn-green" onclick="startMatch()">⚔ 开始匹配</button>
    <button class="btn btn-gray" onclick="switchTab('lb')">🏆 排行榜</button>
    <button class="btn btn-gray" onclick="switchTab('hist')">📋 对战记录</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-lb" onclick="switchTab('lb')">排行榜</button>
    <button class="tab" id="tab-hist" onclick="switchTab('hist')">对战记录</button>
  </div>
  <div class="table-wrap">
    <div id="table-lb"></div>
    <div id="table-hist" style="display:none"></div>
  </div>
</div>
<div id="screen-match" class="screen">
  <div class="match-status">正在匹配对手<span class="dots"></span></div>
  <div class="player-card">
    <div class="pname" id="match-myname"></div>
    <div class="pscore" id="match-myscore"></div>
  </div>
  <button class="btn btn-gray" onclick="cancelMatch()">取消</button>
</div>
<div id="screen-select" class="screen">
  <div class="vs-banner" id="select-banner"></div>
  <div class="opponents-row">
    <div class="opp-info"><div class="oname" id="opp1-name"></div><div class="ohero" id="opp1-hero">未选择</div></div>
    <div style="color:#555;font-size:20px">VS</div>
    <div class="opp-info"><div class="oname" id="opp2-name"></div><div class="ohero" id="opp2-hero">未选择</div></div>
  </div>
  <div class="heroes-grid" id="heroes-grid"></div>
  <div class="select-status" id="select-status">请选择你的英雄</div>
</div>
<div id="screen-game" class="screen">
  <div id="game-wrap">
    <div id="hud">
      <div class="phud left">
        <div class="pname-hud" id="p1name-hud">P1</div>
        <div class="hp-wrap"><div class="hp-fill" id="hp1-fill" style="width:100%"></div></div>
        <div class="skill-row">
          <div><div class="sk" id="sk1k"><span>K</span><div class="cd" id="cd1k" style="display:none"></div></div><div class="sk-label" id="sk1k-label">K</div></div>
          <div><div class="sk" id="sk1l"><span>L</span><div class="cd" id="cd1l" style="display:none"></div></div><div class="sk-label" id="sk1l-label">L</div></div>
        </div>
      </div>
      <div id="center-hud"><div id="timer">60</div><div id="round-txt">ROUND 1</div></div>
      <div class="phud right">
        <div class="pname-hud" id="p2name-hud">P2</div>
        <div class="hp-wrap"><div class="hp-fill" id="hp2-fill" style="width:100%"></div></div>
        <div class="skill-row">
          <div><div class="sk" id="sk2k"><span>K</span><div class="cd" id="cd2k" style="display:none"></div></div><div class="sk-label" id="sk2k-label">K</div></div>
          <div><div class="sk" id="sk2l"><span>L</span><div class="cd" id="cd2l" style="display:none"></div></div><div class="sk-label" id="sk2l-label">L</div></div>
        </div>
      </div>
    </div>
    <canvas id="gc" width="1100" height="580"></canvas>
    <div id="hint">A/D移动 · W跳跃 · S防御(2秒/3秒CD) · J攻击 · K技能1 · L技能2</div>
  </div>
</div>
<div id="screen-result" class="screen">
  <div class="result-title" id="result-title"></div>
  <div class="result-cards" id="result-cards"></div>
  <div style="display:flex;gap:12px;margin-top:8px">
    <button class="btn btn-green" onclick="startMatch()">再战一局</button>
    <button class="btn btn-gray" onclick="showMenu()">返回主菜单</button>
  </div>
</div>
<div id="overlay-msg"><div id="overlay-txt"></div></div>
<script src="./script.js"></script>
</body>
</html>
